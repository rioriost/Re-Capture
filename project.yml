name: Recapture
options:
  bundleIdPrefix: st.rio
  deploymentTarget:
    macOS: "26.0"
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_VERSION: 6.0
packages:
  SDWebImageWebPCoder:
    url: https://github.com/SDWebImage/SDWebImageWebPCoder.git
    from: 0.15.0
targets:
  Recapture:
    type: application
    platform: macOS
    sources:
      - path: Recapture
    dependencies:
      - package: SDWebImageWebPCoder
        product: SDWebImageWebPCoder
    info:
      path: Recapture/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSMinimumSystemVersion: "$(MACOSX_DEPLOYMENT_TARGET)"
        LSUIElement: true
        NSHumanReadableCopyright: "Copyright © 2026 rio. Released under the MIT License."
    entitlements:
      path: Recapture/Recapture.entitlements
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: st.rio.recapture
        PRODUCT_NAME: Re-Capture
        MARKETING_VERSION: 1.0
        CURRENT_PROJECT_VERSION: 1
        MACOSX_DEPLOYMENT_TARGET: "26.0"
